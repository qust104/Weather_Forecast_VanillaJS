<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherGlass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/index.css">
</head>
<body>

<a href="#app" class="skip-link">К содержанию</a>

<div data-js-bg aria-hidden="true"></div>

<div data-js-loader class="hidden" role="status" aria-live="polite">
  <div class="spinner" aria-hidden="true"></div>
  <div class="loader-text">Загружаем погоду<span data-js-loader-dots>...</span></div>
  <div class="loader-countdown" data-js-loader-countdown></div>
</div>

<div data-js-error-toast role="alert" aria-live="assertive" tabindex="-1">
  <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <span data-js-error-msg>Город не найден</span>
</div>

<div id="app" role="main">
  <div class="row-top">

    <div class="glass" id="search-card" role="search" aria-label="Поиск города">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
            <circle cx="12" cy="12" r="4"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-brand">Weather</span><span class="logo-glass">Glass</span>
        </div>
        <button data-js-units-btn class="units-btn" aria-label="Переключить единицы измерения" title="°C / °F">°C</button>
      </div>
      <div class="search-wrap">
        <div class="search-row">
          <input type="text" data-js-city-input placeholder="Введите город..." autocomplete="off" spellcheck="false" aria-label="Введите название города">
          <button data-js-geo-btn class="geo-btn" aria-label="Моё местоположение" title="Определить по геолокации">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
            </svg>
          </button>
          <button data-js-search-btn aria-label="Поиск">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
        </div>
        <div data-js-suggestions class="suggestions is-hidden" role="listbox" aria-label="Подсказки городов"></div>
      </div>
      <div class="quick-cities" data-js-quick-cities></div>
    </div>

    <div class="glass" id="current-card" role="region" aria-label="Текущая погода">
      <div data-js-current-data class="is-hidden" aria-live="polite">
        <div class="current-left">
          <div class="city-name-row">
            <div class="city-name" data-js-city-display>—</div>
            <button data-js-fav-btn class="fav-btn" aria-label="Добавить в избранное" title="Добавить в избранное">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linejoin="round">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
              </svg>
            </button>
          </div>
          <div class="datetime" data-js-datetime-display>—</div>
          <div class="weather-desc-main" data-js-desc-display>—</div>
          <div class="mini-bars" data-js-mini-bars></div>
        </div>
        <div class="current-center">
          <div class="weather-icon-main" data-js-icon-display>
        <img src="assets/icons/weather/cloudy.svg" alt="" class="weather-icon">
      </div>
          <div class="temp-main" data-js-temp-display>—<sup>°C</sup></div>
        </div>
        <div class="current-right" id="stats-display">
          <div class="stat-item">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            <div class="stat-col">
              <div class="stat-label">Влажность</div>
              <div class="stat-value" data-js-humidity-val>—</div>
            </div>
          </div>
          <div class="stat-item">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>
            <div class="stat-col">
              <div class="stat-label">Ветер</div>
              <div class="stat-value" data-js-wind-val>—</div>
            </div>
          </div>
          <div class="stat-item">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="4"/></svg>
            <div class="stat-col">
              <div class="stat-label">Давление</div>
              <div class="stat-value" data-js-pressure-val>—</div>
            </div>
          </div>
          <div class="stat-item">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            <div class="stat-col">
              <div class="stat-label">Видимость</div>
              <div class="stat-value" data-js-visibility-val>—</div>
            </div>
          </div>
        </div>
      </div>
      <div data-js-current-placeholder class="placeholder">
        <div class="ph-icon" aria-hidden="true">🌍</div>
        <p>Введите город для поиска</p>
      </div>
    </div>
  </div>

  <div class="row-bottom">
    <div class="glass" id="bottom-strip" role="region" aria-label="Прогноз на неделю">
      <div id="hourly-card">
        <div class="section-title">По часам</div>
        <div class="hourly-scroll" data-js-hourly-scroll tabindex="0" role="listbox" aria-label="Почасовая погода">
          <div data-js-hourly-placeholder>— нет данных —</div>
        </div>
      </div>
      <div class="strip-divider"></div>
      <div id="weekly-card">
        <div class="section-title">Прогноз на неделю</div>
        <div class="week-items" data-js-week-items>
          <div data-js-weekly-placeholder>— нет данных —</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="scripts/main.js"></script>
</body>
</html>
